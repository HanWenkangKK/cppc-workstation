version: '3.8'
services:
  # Nacos 注册中心与配置中心
  nacos:
    image: nacos/nacos-server:v2.3.2 # 建议使用 2.x 版本支持 gRPC
    container_name: nacos-standalone
    env_file:
      - ./nacos-env.example # 也可以直接写在 environment 里
    environment:
      - PREFER_HOST_MODE=hostname
      - MODE=standalone # 单机模式
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
    volumes:
      - ./nacos/logs:/home/nacos/logs
    ports:
      - "8848:8848" # HTTP 端口
      - "9848:9848" # gRPC 客户端上报端口（必须开启）
      - "9849:9849" # gRPC 服务端同步端口
    restart: always

  # 1. MySQL 8.0：存储患者信息、CPPC标签库、评估报告、审核留痕记录
  cppc-mysql:
    image: mysql:8.0
    container_name: cppc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: your_password # 生产环境请修改
      MYSQL_DATABASE: cppc_platform
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d # 放置上文提到的 schema.sql 自动初始化
    restart: always

  # 2. Redis：存储登录 Token、临时评估缓存、AI 生成进度状态
  cppc-redis:
    image: redis:7.0-alpine
    container_name: cppc-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes # 开启持久化
    restart: always

  # 3. MinIO：存储患者上传的医学影像、生成的 PDF 评估报告、带教视频
  cppc-minio:
    image: minio/minio
    container_name: cppc-minio
    ports:
      - "9000:9000" # API 端口
      - "9001:9001" # 管理后台控制台端口
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"
    restart: always