services:
  postgres:
    image: postgres:16-alpine
    container_name: cppc-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cppc-patient:
    build:
      context: ..
      dockerfile: cppc-patient/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: cppc-patient
    environment:
      SERVER_PORT: 8020
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cppc-ai-agent:
    build:
      context: ..
      dockerfile: cppc-ai-agent/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: cppc-ai-agent
    environment:
      SERVER_PORT: 8030
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cppc-gateway:
    build:
      context: ..
      dockerfile: cppc-gateway/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: cppc-gateway
    environment:
      SERVER_PORT: 8888
      PATIENT_SERVICE_URL: http://cppc-patient:8020
      AI_AGENT_SERVICE_URL: http://cppc-ai-agent:8030
    depends_on:
      - cppc-patient
      - cppc-ai-agent
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: cppc-nginx
    ports:
      - "${NGINX_HTTP_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - cppc-gateway
    restart: unless-stopped

volumes:
  postgres_data:
