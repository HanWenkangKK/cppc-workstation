server:
  port: ${SERVER_PORT:8030}
spring:
  application:
    name: cppc-ai-agent
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cppc_platform}
    username: ${SPRING_DATASOURCE_USERNAME:cppcadmin}
    password: ${SPRING_DATASOURCE_PASSWORD:cppcadmin}
    driver-class-name: org.postgresql.Driver
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
